<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 720" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35400" />
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="170" y="44" font-size="22" font-weight="700" text-anchor="middle">Slack</text>
  <text x="600" y="44" font-size="22" font-weight="700" text-anchor="middle">Channel framework (Slack impl)</text>
  <text x="1180" y="44" font-size="22" font-weight="700" text-anchor="middle">Agent runtime</text>

  <!-- Column separators -->
  <line x1="330" y1="60" x2="330" y2="660" stroke="#999" stroke-width="1.5" stroke-dasharray="6 6" />
  <line x1="880" y1="60" x2="880" y2="660" stroke="#999" stroke-width="1.5" stroke-dasharray="6 6" />

  <!-- ============ Slack column ============ -->

  <!-- User in Slack -->
  <rect x="50" y="90" width="240" height="70" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="170" y="120" text-anchor="middle" font-weight="600">User in Slack</text>
  <text x="170" y="142" text-anchor="middle" font-size="13" fill="#555">/zip-agent · split-pane message</text>

  <!-- HTTPS webhook -->
  <rect x="50" y="210" width="240" height="70" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="170" y="240" text-anchor="middle" font-weight="600">HTTPS webhook</text>
  <text x="170" y="260" text-anchor="middle" font-size="13" fill="#555">POST /slack · POST /slack/events</text>

  <!-- Slack Web API (outbound) -->
  <rect x="50" y="460" width="240" height="90" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="170" y="490" text-anchor="middle" font-weight="600">Slack Web API</text>
  <text x="170" y="510" text-anchor="middle" font-size="13" fill="#555">chat.update · postMessage</text>
  <text x="170" y="528" text-anchor="middle" font-size="13" fill="#555">assistant.threads.setStatus</text>

  <!-- User → webhook -->
  <line x1="170" y1="160" x2="170" y2="206" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Slack Web API → User (reply / status render) -->
  <line x1="170" y1="460" x2="170" y2="162" stroke="#d35400" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-orange)" />
  <text x="30" y="320" text-anchor="start" font-size="12" fill="#d35400">render to</text>
  <text x="30" y="336" text-anchor="start" font-size="12" fill="#d35400">thread</text>

  <!-- ============ Channel framework column ============ -->

  <!-- Flask route -->
  <rect x="360" y="90" width="260" height="85" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="118" text-anchor="middle" font-weight="600">routes/slack_routes.py</text>
  <text x="490" y="140" text-anchor="middle" font-size="13" fill="#555">slash → dispatch</text>
  <text x="490" y="158" text-anchor="middle" font-size="13" fill="#555">event → SlackMessageRouter</text>

  <!-- Router -->
  <rect x="360" y="210" width="260" height="70" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="240" text-anchor="middle" font-weight="600">SlackMessageRouter</text>
  <text x="490" y="260" text-anchor="middle" font-size="13" fill="#555">picks super-agent handler</text>

  <!-- Celery task -->
  <rect x="360" y="320" width="260" height="90" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="348" text-anchor="middle" font-weight="600">Celery task</text>
  <text x="490" y="368" text-anchor="middle" font-size="12" fill="#555">deferred_initiate_super_agent</text>
  <text x="490" y="384" text-anchor="middle" font-size="12" fill="#555">_slack_session</text>
  <text x="490" y="400" text-anchor="middle" font-size="12" fill="#555">handler._enqueue_turn</text>

  <!-- Redis session marker (shared plumbing) -->
  <rect x="680" y="210" width="200" height="70" rx="10" ry="10" fill="#eef6ff" stroke="#1f6feb" stroke-width="2" />
  <text x="780" y="240" text-anchor="middle" font-weight="600" fill="#1f6feb">Redis session marker</text>
  <text x="780" y="260" text-anchor="middle" font-size="11" fill="#1f6feb">slack_super_agent_session:&lt;ts&gt;</text>

  <!-- post_step / renderer -->
  <rect x="500" y="460" width="280" height="90" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="640" y="488" text-anchor="middle" font-weight="600">post_step.py</text>
  <text x="640" y="508" text-anchor="middle" font-size="12" fill="#555">renderer → Slack Block Kit</text>
  <text x="640" y="524" text-anchor="middle" font-size="12" fill="#555">chat.update · chat.postMessage</text>

  <!-- arrows within channel framework -->
  <line x1="290" y1="125" x2="356" y2="125" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="323" y="117" text-anchor="middle" font-size="11" fill="#555">slash</text>

  <line x1="290" y1="245" x2="356" y2="245" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="323" y="237" text-anchor="middle" font-size="11" fill="#555">event</text>

  <line x1="490" y1="175" x2="490" y2="206" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="490" y1="280" x2="490" y2="316" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Celery ↔ Redis marker -->
  <line x1="620" y1="340" x2="700" y2="282" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="685" y="310" text-anchor="middle" font-size="11" fill="#1f6feb">read / write</text>

  <!-- ============ Agent runtime column ============ -->

  <!-- DBOS queue -->
  <rect x="940" y="90" width="340" height="75" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="1110" y="120" text-anchor="middle" font-weight="600">DBOS queue</text>
  <text x="1110" y="142" text-anchor="middle" font-size="12" fill="#555">agent_turns · partitioned by session</text>

  <!-- agent_turn_workflow -->
  <rect x="940" y="200" width="340" height="140" rx="10" ry="10" fill="#fff7e6" stroke="#d35400" stroke-width="2" />
  <text x="1110" y="228" text-anchor="middle" font-weight="700" fill="#d35400">agent_turn_workflow (DBOS)</text>
  <text x="1110" y="254" text-anchor="middle" font-size="12" fill="#555">asyncio.gather:</text>
  <text x="1110" y="274" text-anchor="middle" font-size="12" fill="#555">· run_agent_turn (LangGraph)</text>
  <text x="1110" y="294" text-anchor="middle" font-size="12" fill="#555">· stream_placeholder_updates   (slash)</text>
  <text x="1110" y="314" text-anchor="middle" font-size="12" fill="#555">  or stream_assistant_status_updates</text>
  <text x="1110" y="328" text-anchor="middle" font-size="11" fill="#888">(use_assistant_api branch)</text>

  <!-- Redis stream -->
  <rect x="940" y="370" width="340" height="75" rx="10" ry="10" fill="#eef6ff" stroke="#1f6feb" stroke-width="2" />
  <text x="1110" y="400" text-anchor="middle" font-weight="600" fill="#1f6feb">Redis stream</text>
  <text x="1110" y="422" text-anchor="middle" font-size="12" fill="#1f6feb">agent:stream:&lt;session_guid&gt;</text>

  <!-- Ent -->
  <rect x="940" y="475" width="340" height="90" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="1110" y="503" text-anchor="middle" font-weight="600">EntCopilotSession</text>
  <text x="1110" y="523" text-anchor="middle" font-size="12" fill="#555">+ EntCopilotMessage (durable)</text>
  <text x="1110" y="541" text-anchor="middle" font-size="12" fill="#555">LangGraph checkpoint in Redis</text>

  <!-- Celery → DBOS queue (enqueue) -->
  <line x1="620" y1="360" x2="936" y2="125" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="780" y="230" text-anchor="middle" font-size="12" fill="#222">DBOSClient.enqueue</text>

  <!-- Queue → workflow -->
  <line x1="1110" y1="165" x2="1110" y2="196" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Workflow → Redis stream (emit) -->
  <line x1="1040" y1="340" x2="1040" y2="366" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="1000" y="360" text-anchor="middle" font-size="11" fill="#1f6feb">emit</text>

  <!-- Workflow → Ent (persist) -->
  <line x1="1180" y1="340" x2="1180" y2="471" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="1220" y="410" text-anchor="middle" font-size="11" fill="#222">persist</text>

  <!-- Redis stream → post_step (tailer reads) -->
  <line x1="936" y1="405" x2="784" y2="488" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="860" y="440" text-anchor="middle" font-size="11" fill="#1f6feb">tail</text>

  <!-- post_step → Slack Web API -->
  <line x1="500" y1="500" x2="294" y2="500" stroke="#d35400" stroke-width="2" marker-end="url(#arrow-orange)" />
  <text x="398" y="492" text-anchor="middle" font-size="12" fill="#d35400">WebClient call</text>

  <!-- Footnote -->
  <text x="750" y="650" text-anchor="middle" font-size="13" fill="#555">
    one DBOS workflow, two finalize paths — slash edits a placeholder; split-pane posts a fresh reply + native setStatus
  </text>
  <text x="750" y="672" text-anchor="middle" font-size="13" fill="#555">
    no Kafka in the inbound path; inbound is webhook → Flask → Celery → DBOS
  </text>
</svg>
