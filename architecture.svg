<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35400" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b46c1" />
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="160" y="40" font-size="20" font-weight="700" text-anchor="middle">Slack</text>
  <text x="615" y="40" font-size="20" font-weight="700" text-anchor="middle">Channel implementation</text>
  <text x="1150" y="40" font-size="20" font-weight="700" text-anchor="middle">Agent runtime</text>

  <!-- Column separators -->
  <line x1="310" y1="55" x2="310" y2="555" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6 6" />
  <line x1="920" y1="55" x2="920" y2="555" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6 6" />

  <!-- ============ Slack column ============ -->

  <rect x="50" y="100" width="220" height="60" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="160" y="126" text-anchor="middle" font-weight="600">User in Slack</text>
  <text x="160" y="146" text-anchor="middle" font-size="12" fill="#555">/zip-agent or split-pane</text>

  <rect x="50" y="220" width="220" height="60" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="160" y="246" text-anchor="middle" font-weight="600">HTTPS webhook</text>
  <text x="160" y="266" text-anchor="middle" font-size="12" fill="#555">POST /slack/events</text>

  <rect x="50" y="420" width="220" height="72" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="160" y="447" text-anchor="middle" font-weight="600">Slack Web API</text>
  <text x="160" y="465" text-anchor="middle" font-size="12" fill="#555">chat.update / postMessage</text>
  <text x="160" y="481" text-anchor="middle" font-size="12" fill="#555">setStatus</text>

  <line x1="160" y1="160" x2="160" y2="216" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="160" y1="420" x2="160" y2="162" stroke="#d35400" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-orange)" />
  <text x="18" y="305" text-anchor="start" font-size="11" fill="#d35400">render to</text>
  <text x="18" y="319" text-anchor="start" font-size="11" fill="#d35400">thread</text>

  <!-- ============ Middle column ============ -->

  <!-- Framework interface box (one tidy box, not a band) -->
  <rect x="345" y="80" width="555" height="72" rx="10" ry="10" fill="#f5f0ff" stroke="#6b46c1" stroke-width="2" stroke-dasharray="4 3" />
  <text x="622" y="108" text-anchor="middle" font-weight="700" fill="#6b46c1">Channel framework interface (shared, channel-agnostic)</text>
  <text x="622" y="130" text-anchor="middle" font-size="12" fill="#6b46c1">AgentChannelHandler · InboundReply · SentMessageRef</text>

  <!-- Slack impl: vertical flow -->
  <rect x="360" y="185" width="260" height="58" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="211" text-anchor="middle" font-weight="600">Flask route</text>
  <text x="490" y="230" text-anchor="middle" font-size="12" fill="#555">routes/slack_routes.py</text>

  <rect x="360" y="275" width="260" height="58" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="301" text-anchor="middle" font-weight="600">SlackMessageRouter</text>
  <text x="490" y="320" text-anchor="middle" font-size="12" fill="#555">dispatches to handler</text>

  <rect x="360" y="365" width="260" height="74" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="490" y="391" text-anchor="middle" font-weight="600">Super-agent handler</text>
  <text x="490" y="410" text-anchor="middle" font-size="12" fill="#555">agentic router (turn 1)</text>
  <text x="490" y="427" text-anchor="middle" font-size="12" fill="#555">enqueue turn on DBOS</text>

  <rect x="660" y="275" width="240" height="164" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="780" y="301" text-anchor="middle" font-weight="600">Renderer + post_step</text>
  <text x="780" y="321" text-anchor="middle" font-size="12" fill="#555">markdown → Block Kit</text>
  <text x="780" y="348" text-anchor="middle" font-size="12" fill="#555">Slash: chat.update</text>
  <text x="780" y="370" text-anchor="middle" font-size="12" fill="#555">Split-pane: postMessage</text>
  <text x="780" y="386" text-anchor="middle" font-size="12" fill="#555">+ setStatus</text>
  <text x="780" y="415" text-anchor="middle" font-size="11" fill="#888">(same renderer, different</text>
  <text x="780" y="429" text-anchor="middle" font-size="11" fill="#888">Slack API calls per surface)</text>

  <!-- Arrows within impl -->
  <line x1="490" y1="243" x2="490" y2="271" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="490" y1="333" x2="490" y2="361" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- impl implements interface -->
  <line x1="490" y1="185" x2="490" y2="156" stroke="#6b46c1" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arrow-purple)" />
  <text x="530" y="175" text-anchor="start" font-size="11" fill="#6b46c1">implements</text>

  <!-- webhook → flask route -->
  <line x1="270" y1="245" x2="356" y2="212" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============ Agent runtime column ============ -->

  <rect x="950" y="100" width="340" height="60" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="1120" y="127" text-anchor="middle" font-weight="600">DBOS queue</text>
  <text x="1120" y="147" text-anchor="middle" font-size="11" fill="#555">one turn per session, retried on crash</text>

  <rect x="950" y="190" width="340" height="118" rx="10" ry="10" fill="#fff7e6" stroke="#d35400" stroke-width="2" />
  <text x="1120" y="218" text-anchor="middle" font-weight="700" fill="#d35400">agent_turn_workflow</text>
  <text x="1120" y="243" text-anchor="middle" font-size="12" fill="#555">run_agent_turn (LangGraph)</text>
  <text x="1120" y="262" text-anchor="middle" font-size="12" fill="#555">+ stream tailer → Slack</text>
  <text x="1120" y="290" text-anchor="middle" font-size="11" fill="#888">one workflow, branches on</text>
  <text x="1120" y="303" text-anchor="middle" font-size="11" fill="#888">use_assistant_api</text>

  <rect x="950" y="340" width="340" height="60" rx="10" ry="10" fill="#eef6ff" stroke="#1f6feb" stroke-width="2" />
  <text x="1120" y="367" text-anchor="middle" font-weight="600" fill="#1f6feb">Redis stream</text>
  <text x="1120" y="385" text-anchor="middle" font-size="11" fill="#1f6feb">one event per LangChain step</text>

  <rect x="950" y="430" width="340" height="72" rx="10" ry="10" fill="#ffffff" stroke="#222" stroke-width="2" />
  <text x="1120" y="457" text-anchor="middle" font-weight="600">EntCopilotSession</text>
  <text x="1120" y="475" text-anchor="middle" font-size="12" fill="#555">durable conversation history</text>
  <text x="1120" y="491" text-anchor="middle" font-size="12" fill="#555">(messages, tool calls)</text>

  <!-- Handler → DBOS queue -->
  <line x1="620" y1="400" x2="946" y2="132" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="800" y="250" text-anchor="middle" font-size="11" fill="#222">enqueue</text>

  <!-- Queue → workflow -->
  <line x1="1120" y1="160" x2="1120" y2="186" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Workflow → Redis stream -->
  <line x1="1060" y1="308" x2="1060" y2="336" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="1024" y="330" text-anchor="middle" font-size="10" fill="#1f6feb">emit</text>

  <!-- Workflow → Ent -->
  <line x1="1190" y1="308" x2="1190" y2="426" stroke="#222" stroke-width="2" marker-end="url(#arrow)" />
  <text x="1222" y="370" text-anchor="middle" font-size="10" fill="#222">persist</text>

  <!-- Redis stream → post_step -->
  <line x1="946" y1="370" x2="904" y2="360" stroke="#1f6feb" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="920" y="350" text-anchor="middle" font-size="10" fill="#1f6feb">tail</text>

  <!-- post_step → Slack Web API -->
  <line x1="660" y1="415" x2="274" y2="450" stroke="#d35400" stroke-width="2" marker-end="url(#arrow-orange)" />

  <!-- Footnote -->
  <text x="700" y="555" text-anchor="middle" font-size="12" fill="#666">Email and comment channels drop into the same purple interface; only the middle column changes.</text>
</svg>
